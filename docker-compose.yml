services:
  api:
    build: .
    image: infortributos/fiscalia-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  postgres:
    image: infortributos/postgres:17.7
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fiscalia
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fiscalia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - appnet

volumes:
  pgdata:
    name: fiscalia_pgdata

networks:
  appnet:
    driver: bridge
