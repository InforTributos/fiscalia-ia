version: '3.8'

services:
  api:
    build: .
    image: fiscalia-api
    ports:
      - "${API_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    restart: unless-stopped
    cpus: '1.0'
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  postgres:
    image: postgres:15
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fiscalia
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fiscalia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - appnet

volumes:
  pgdata:
    name: fiscalia_pgdata

networks:
  appnet:
    driver: bridge
