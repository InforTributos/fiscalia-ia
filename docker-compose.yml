version: '3.8'

services:
  microservice:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    restart: unless-stopped
    labels:
      org.opencontainers.image.title: "FiscalIA"
      org.opencontainers.image.version: "2.0.0"
      org.opencontainers.image.description: "Microservicio de IA para fiscalización ICA"
      org.opencontainers.image.vendor: "Informatica y Tributos S.A.S."
      org.opencontainers.image.source: "https://github.com/informaticaytributos/fiscalia-ia"
      org.opencontainers.image.licenses: "MIT"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
